<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A6 Labs // Archive Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background-color: #121416; color: #d1d5db; margin: 0; padding: 40px 20px; }
        .auth-box { max-width: 400px; margin: 80px auto; background: #1a1d20; padding: 40px; border-radius: 16px; border: 1px solid #282c30; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #2d3136; background: #15171a; color: white; }
        .btn-green { background-color: #2e4d41; color: white; border: none; padding: 14px; border-radius: 8px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
<div id="authPanel" class="auth-box">
    <h2 id="authTitle">A6 Labs Vault</h2>
    <input type="email" id="authEmail" placeholder="Email">
    <input type="password" id="authPassword" placeholder="Passcode">
    <button class="btn-green" onclick="handleAuth()">Access Archive</button>
</div>
<script>
    const SUPABASE_URL = "https://vqfklyfiodlnffdrsnnk.supabase.co/rest/v1/"; 
    const SUPABASE_ANON_KEY = "sb_publishable_2qdPxaZA3GUozbYCbThMSg_KXOi7WxS";
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function handleAuth() {
        const email = document.getElementById('authEmail').value;
        const password = document.getElementById('authPassword').value;
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if(error) alert(error.message); else location.reload();
    }
</script>
</body>
</html>
