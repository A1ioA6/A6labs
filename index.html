<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A6 Labs // Archive Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121416; 
            color: #d1d5db; 
            margin: 0;
            padding: 40px 20px;
        }
        .auth-box {
            max-width: 400px;
            margin: 80px auto;
            background: #1a1d20;
            padding: 40px;
            border-radius: 16px;
            border: 1px solid #282c30;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #94a3b8; font-size: 13px; letter-spacing: 0.3px; }
        input[type="email"], input[type="password"] { 
            width: 100%; padding: 12px 16px; border: 1px solid #2d3136; border-radius: 8px; 
            box-sizing: border-box; background-color: #15171a; color: #e2e8f0; font-size: 15px;
        }
        input:focus { outline: none; border-color: #4b5563; background-color: #1a1d20; }
        .btn-green { background-color: #2e4d41; color: #e2e8f0; border: none; padding: 14px 20px; border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: 600; width: 100%; margin-bottom: 10px; }
        .btn-green:hover { background-color: #243d34; }
        .btn-text { background: none; border: none; color: #60a5fa; cursor: pointer; font-size: 14px; text-decoration: underline; padding: 0; }
        #authMessage { font-size: 14px; margin-top: 10px; color: #ef4444; }
        #authMessage.success { color: #22c55e; }
    </style>
</head>
<body>

<div id="authPanel" class="auth-box">
    <h2 id="authTitle" style="margin-bottom:8px;">A6 Labs Vault</h2>
    <p id="authSubtitle" style="color:#8a929b; font-size:14px; margin:0 0 25px 0;">Sign in to unlock your data grid framework.</p>
    <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="authEmail" placeholder="name@domain.com">
    </div>
    <div class="form-group">
        <label>Vault Passcode</label>
        <input type="password" id="authPassword" placeholder="••••••••">
    </div>
    <button class="btn-green" id="mainAuthBtn" onclick="handleAuth()">Access Archive</button>
    <p id="authMessage"></p>
    <p style="text-align:center; font-size:14px; color:#8a929b; margin-top:20px;">
        <span id="toggleAuthText">Don't have an archive profile?</span> 
        <button class="btn-text" id="toggleAuthBtn" onclick="toggleAuthMode()">Register Now</button>
    </p>
</div>

<script>
    const SUPABASE_URL = "https://vqfklyfiodlnffdrsnnk.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZxZmtseWZpb2RsbmZmZHJzbm5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMjc0NzAsImV4cCI6MjA5NzgwMzQ3MH0.l67HL_AlrwLmBy5YHmtHqN75WAhtM6eMvv4W7Zc73W4";

    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    var authMode = "signin";

    function toggleAuthMode() {
        if(authMode === "signin") {
            authMode = "signup";
            document.getElementById('authTitle').innerText = "Create Vault Profile";
            document.getElementById('authSubtitle').innerText = "Register your custom encrypted station address.";
            document.getElementById('mainAuthBtn').innerText = "Register Profile";
            document.getElementById('toggleAuthText').innerText = "Already have an account?";
            document.getElementById('toggleAuthBtn').innerText = "Sign In";
        } else {
            authMode = "signin";
            document.getElementById('authTitle').innerText = "A6 Labs Vault";
            document.getElementById('authSubtitle').innerText = "Sign in to unlock your data grid framework.";
            document.getElementById('mainAuthBtn').innerText = "Access Archive";
            document.getElementById('toggleAuthText').innerText = "Don't have an archive profile?";
            document.getElementById('toggleAuthBtn').innerText = "Register Now";
        }
        document.getElementById('authMessage').textContent = '';
    }

    async function handleAuth() {
        const email = document.getElementById('authEmail').value;
        const password = document.getElementById('authPassword').value;
        const msg = document.getElementById('authMessage');
        msg.textContent = '';
        msg.className = '';

        if(!email || !password) { msg.textContent = "Please complete authentication credentials."; return; }

        if(authMode === "signup") {
            const { data, error } = await supabaseClient.auth.signUp({ email, password });
            if (error) { msg.textContent = "Registration Error: " + error.message; return; }
            msg.textContent = "Registration successful! You can now sign in.";
            msg.className = 'success';
            setTimeout(() => toggleAuthMode(), 1500);
        } else {
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) { msg.textContent = "Access Denied: " + error.message; return; }
            window.location.href = 'dashboard.html';
        }
    }

    window.onload = async function() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) window.location.href = 'dashboard.html';
    };
</script>
</body>
</html>
