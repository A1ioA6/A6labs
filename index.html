<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A6 Labs // Archive Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background-color: #121416; color: #d1d5db; margin: 0; padding: 40px 20px; }
        .auth-box { max-width: 400px; margin: 80px auto; background: #1a1d20; padding: 40px; border-radius: 16px; border: 1px solid #282c30; }
        h2 { margin-bottom: 6px; }
        p.subtitle { color: #6b7280; font-size: 14px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #2d3136; background: #15171a; color: white; box-sizing: border-box; }
        .btn-green { background-color: #2e4d41; color: white; border: none; padding: 14px; border-radius: 8px; width: 100%; cursor: pointer; font-size: 16px; margin-bottom: 12px; }
        .btn-green:hover { background-color: #3a6152; }
        #authMessage { font-size: 14px; margin-top: 10px; }
        .error { color: #ef4444; }
        .success { color: #22c55e; }
        .toggle { text-align: center; font-size: 14px; color: #6b7280; }
        .toggle a { color: #4ade80; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

<div id="authPanel" class="auth-box">
    <h2 id="authTitle">A6 Labs Vault</h2>
    <p class="subtitle" id="authSubtitle">Sign in to unlock your archive.</p>
    <input type="email" id="authEmail" placeholder="Email Address">
    <input type="password" id="authPassword" placeholder="Vault Passcode">
    <button class="btn-green" onclick="handleAuth()">Access Archive</button>
    <p class="toggle" id="toggleText">
        Don't have an account? <a onclick="toggleMode()">Register Now</a>
    </p>
    <p id="authMessage"></p>
</div>

<script>
    const SUPABASE_URL = "https://vqfklyfiodlnffdrsnnk.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZxZmtseWZpb2RsbmZmZHJzbm5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMjc0NzAsImV4cCI6MjA5NzgwMzQ3MH0.l67HL_AlrwLmBy5YHmtHqN75WAhtM6eMvv4W7Zc73W4";

    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let isLoginMode = true;

    function toggleMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('authTitle').textContent = isLoginMode ? 'A6 Labs Vault' : 'Create Account';
        document.getElementById('authSubtitle').textContent = isLoginMode ? 'Sign in to unlock your archive.' : 'Register to access the archive.';
        document.getElementById('authMessage').textContent = '';
        const btn = document.querySelector('.btn-green');
        btn.textContent = isLoginMode ? 'Access Archive' : 'Register';
        document.getElementById('toggleText').innerHTML = isLoginMode
            ? 'Don\'t have an account? <a onclick="toggleMode()">Register Now</a>'
            : 'Already have an account? <a onclick="toggleMode()">Sign In</a>';
    }

    async function handleAuth() {
        const email = document.getElementById('authEmail').value;
        const password = document.getElementById('authPassword').value;
        const msg = document.getElementById('authMessage');
        msg.textContent = '';
        msg.className = '';

        if (!email || !password) {
            msg.textContent = 'Please fill in both fields.';
            msg.className = 'error';
            return;
        }

        if (isLoginMode) {
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) {
                msg.textContent = error.message;
                msg.className = 'error';
            } else {
                location.reload();
            }
        } else {
            const { error } = await supabaseClient.auth.signUp({ email, password });
            if (error) {
                msg.textContent = error.message;
                msg.className = 'error';
            } else {
                msg.textContent = 'Account created! Check your email to confirm.';
                msg.className = 'success';
            }
        }
    }
</script>

</body>
</html>
