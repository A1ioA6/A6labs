<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A6Labs Dashboard</title>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; background: #f4f4f9; color: #333; }
        .sidebar { width: 250px; height: 100vh; background: #2c3e50; color: white; padding: 20px; box-sizing: border-box; }
        .main-content { flex: 1; padding: 40px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>A6Labs</h2>
        <p>📊 Overview</p>
        <p>⚙️ Settings</p>
        <button onclick="window.location.href='index.html'">Logout</button>
    </div>

    <div class="main-content">
        <header>
            <h1>Welcome to your Dashboard!</h1>
        </header>
        <div class="card">
            <h3>System Status</h3>
            <p>You have successfully connected your login page to the dashboard portal.</p>
        </div>
    </div>

</body>
</html>
