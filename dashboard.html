<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A6 Labs | Full Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0f1115; --sidebar: #151820; --card: #1a1d24; --border: #252830;
            --accent: #2e7d5e; --blue: #3b82f6; --red: #ef4444; --success: #22c55e;
            --text: #e2e8f0; --muted: #64748b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }

        /* Sidebar & Layout */
        .sidebar { width: 240px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 24px 16px; position: fixed; height: 100vh; }
        .main { margin-left: 240px; flex: 1; padding: 32px 40px; width: calc(100% - 240px); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* UI Components */
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 20px; }
        .timer-display { font-size: 3.5rem; font-weight: 800; text-align: center; margin: 15px 0; color: var(--accent); font-family: monospace; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; }
        .btn-green { background: var(--accent); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div style="font-size: 1.3rem; font-weight: 800; margin-bottom: 30px;">A6 <span>Labs</span></div>
    <button class="menu-btn active" onclick="switchTab('overview', this)">📊 Dashboard</button>
    <button class="menu-btn" onclick="switchTab('fitness', this)">💪 Health</button>
    <button class="menu-btn" onclick="switchTab('meals', this)">🍳 AI Meals</button>
</div>

<div class="main">
    <div id="overview" class="tab-content active">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="label">💧 Water</div>
                <div class="value" id="dash-water">0 ml</div>
            </div>
            <div class="stat-card">
                <div class="label">👟 Steps</div>
                <div class="value" id="dash-steps">0</div>
            </div>
        </div>

        <div class="card">
            <h3>⏱️ Focus Session</h3>
            <div class="timer-display" id="timer">25:00</div>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button class="btn btn-green" onclick="startTimer()">Start</button>
                <button class="btn btn-outline" onclick="resetTimer()">Reset</button>
            </div>
        </div>
    </div>

    </div>

<script>
    // --- SUPABASE CONFIG ---
    const SUPABASE_URL = "https://vqfklyfiodlnffdrsnnk.supabase.co";
    const SUPABASE_ANON_KEY = "YOUR_ANON_KEY_HERE";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // --- APP STATE ---
    let timerInterval;
    let timeLeft = 25 * 60;

    // --- NAVIGATION ---
    function switchTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    // --- TIMER LOGIC ---
    function startTimer() {
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            document.getElementById('timer').textContent = `${mins}:${secs < 10 ? '0'+secs : secs}`;
            if (timeLeft <= 0) { clearInterval(timerInterval); alert("Session complete!"); }
        }, 1000);
    }
    function resetTimer() { clearInterval(timerInterval); timeLeft = 25 * 60; document.getElementById('timer').textContent = "25:00"; }

    // --- DATABASE INITIALIZATION ---
    async function initDashboard() {
        // This is where you put your loading logic (e.g., fetch water, steps, tasks)
        console.log("Dashboard initialized. Connecting to Supabase...");
    }

    window.onload = initDashboard;
</script>
</body>
</html>
